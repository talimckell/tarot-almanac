<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" role="img" aria-label="The twenty-two Major Arcana in a row, zero to twenty-one. Cards one through nine, the Magician to the Hermit, are highlighted as the only cards a Soul card can be. The Fool at zero and the whole back half, the Wheel of Fortune through the World, are greyed out as never reachable."><defs><style>@import url("https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400&amp;family=Cormorant+SC:wght@400;500&amp;family=Lato:wght@300;400&amp;display=swap");</style></defs>
