<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 434" role="img" aria-label="One birthday, June 11 1992, run two ways. Reduction adds the whole date to 2009 and reduces it twice to Justice and the High Priestess, two low cards. The wheel adds only month and day, 6 plus 11 is 17, and lands on the Star."><defs><style>@import url("https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400&amp;family=Cormorant+SC:wght@400;500&amp;family=Lato:wght@300;400&amp;display=swap");</style></defs>
<text x="320" y="40" text-anchor="middle" font-family="'Cormorant SC',Georgia,serif" font-style="normal" font-size="15" letter-spacing="2.5" fill="#5f5648">ONE BIRTHDAY, TWO METHODS</text><text x="320" y="67" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="20" fill="#4a3e30">June 11, 1992</text><line x1="320" y1="96" x2="320" y2="398" stroke="#b8a890" stroke-width="1"/><text x="160" y="124" text-anchor="middle" font-family="'Cormorant SC',Georgia,serif" font-style="normal" font-size="16" letter-spacing="2" fill="#1e3a58">REDUCTION</text><text x="160" y="168" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="normal" font-size="21" fill="#2e2418">6 + 11 + 1992 = 2009</text><line x1="160" y1="186" x2="160" y2="226" stroke="#1e3a58" stroke-width="1.4"/><path d="M 156 225 L 160 232 L 164 225 Z" fill="#1e3a58"/><text x="218" y="212" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="13" fill="#5f5648">reduce twice</text><circle cx="116" cy="278" r="21" fill="none" stroke="#1e3a58" stroke-width="1.2"/><text x="116" y="278" text-anchor="middle" dominant-baseline="central" font-family="'Cormorant',Georgia,serif" font-size="15" fill="#2e2418">11</text><circle cx="204" cy="278" r="21" fill="none" stroke="#1e3a58" stroke-width="1.2"/><text x="204" y="278" text-anchor="middle" dominant-baseline="central" font-family="'Cormorant',Georgia,serif" font-size="15" fill="#2e2418">2</text><text x="116" y="314" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="14" fill="#4a3e30">Justice</text><text x="204" y="314" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="12.5" fill="#4a3e30">The High Priestess</text><text x="160" y="360" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="13.5" fill="#5f5648">two cards, both low on the deck</text><text x="480" y="124" text-anchor="middle" font-family="'Cormorant SC',Georgia,serif" font-style="normal" font-size="16" letter-spacing="2" fill="#1e3a58">THE WHEEL</text><text x="480" y="168" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="normal" font-size="21" fill="#2e2418">6 + 11 = 17</text><line x1="480" y1="186" x2="480" y2="226" stroke="#1e3a58" stroke-width="1.4"/><path d="M 476 225 L 480 232 L 484 225 Z" fill="#1e3a58"/><text x="520" y="212" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="13" fill="#5f5648">wrap</text><circle cx="480" cy="278" r="25" fill="#1e3a58" stroke="#1e3a58" stroke-width="1.2"/><text x="480" y="278" text-anchor="middle" dominant-baseline="central" font-family="'Cormorant',Georgia,serif" font-size="18" fill="#f6f2eb">17</text><text x="480" y="316" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="15.5" fill="#4a3e30">The Star</text><text x="480" y="360" text-anchor="middle" font-family="'Cormorant',Georgia,serif" font-style="italic" font-size="13.5" fill="#5f5648">one card, anywhere on the wheel</text>
</svg>